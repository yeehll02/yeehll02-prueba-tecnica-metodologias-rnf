services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vulnerabilidades_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./etapa2-backend/etapa2-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vulnerabilidades_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/vulnerabilities?page=0&size=1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  seeder:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./etapa1-python:/app/etapa1-python
    command: >
      sh -c "pip install pg8000 python-dotenv -q && python etapa1-python/cargar_bd.py"
    environment:
      DB_NAME: vulnerabilidades_db
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./etapa2-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
